<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <link rel="stylesheet" href="./style/style.css">
    <link rel="icon" href="./assets/github-logo.png">

    <title>GitHub Issues Tracker</title>

    <style>
        button {
            cursor: pointer;
        }
    </style>

</head>

<body class="bg-gray-100 w-full">

    <!-- HEADER -->
    <header class="bg-gray-200  mx-auto">

        <nav class="w-full mx-auto px-6 py-2 flex items-center justify-between">

            <div class="flex items-center gap-2">
                <img class="w-6" src="./assets/github-logo.png">
                <h2 class="font-semibold">GitHub Issues Tracker</h2>
            </div>

            <div class="flex items-center gap-3">

                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>

                    <input id="search-input" type="text" placeholder="Search issues..."
                        class="pl-9 pr-4 py-1.5 border rounded-md w-[260px] text-sm focus:outline-none focus:border-gray-400" />

                </div>

                <button id="new-issue-btn" class="btn btn-sm bg-purple-600 text-white hover:bg-purple-700 border-none">
                    + New Issue
                </button>
            </div>
        </nav>
    </header>

    <!-- FILTER BUTTONS -->

    <section class="max-w-[91.666%] h-[88px] p-6 mt-8 bg-gray-200 mx-auto flex items-center">

        <button id="all" class="py-1 px-8 text-white rounded-xl mx-1 bg-blue-600">
            All
        </button>

        <button id="open" class="py-1 px-8 rounded-xl mx-1 border">
            Open
        </button>

        <button id="close" class="py-1 px-8 rounded-xl mx-1 border">
            Closed
        </button>

    </section>

    <!-- TOTAL ISSUES -->

    <section class="bg-gray-200 max-w-[91.666%] p-6 mt-6 flex justify-between mx-auto rounded-lg">

        <div class="flex items-center gap-3">

            <div class="w-[50px] h-[50px] rounded-full bg-[#DBEAFE] flex items-center justify-center">
                <img src="./assets/Aperture.png">
            </div>
            <div>
                <h2 class="font-bold">
                    <span id="Total-issue">0</span> Issues
                </h2>
                <p>Track and manage your project issues</p>
            </div>
        </div>

        <div class="flex gap-4">

            <div class="flex items-center gap-2 font-bold">
                <div class="w-3 h-3 rounded-full bg-[#00A96E]"></div>
                <p>Open</p>
            </div>

            <div class="flex items-center gap-2 font-bold">
                <div class="w-3 h-3 rounded-full bg-[#A855F7]"></div>
                <p>Closed</p>
            </div>

        </div>

    </section>

    <!-- ISSUES LIST -->

    <section id="All-issues" class="flex flex-wrap gap-5 mt-3 max-w-[91.666%] p-6 mx-auto justify-center">

   
    </section>

    <!-- ISSUE DETAILS MODAL -->

    <dialog id="Issues_model" class="modal">
        <div class="modal-box max-w-xl p-0 rounded-lg overflow-hidden">
            <div class="px-6 pt-5 pb-3 border-b border-gray-200">
                <div class="flex items-center gap-3">
                    <h3 id="modal-title" class="text-[18px] font-semibold text-gray-800">
                    </h3>

                    <span id="modal-status" class="px-2 py-[2px] text-xs font-medium rounded-full">
                    </span>

                </div>

                <p class="text-xs text-gray-400 mt-1">

                    Opened by
                    <span id="modal-author" class="text-gray-600 font-medium">
                    </span>

                    ·
                    <span id="modal-date"></span>

                </p>

            </div>

            <div class="px-6 py-4">

                <div id="modal-labels" class="flex gap-2 mb-3">
                </div>

                <p id="modal-description" class="text-sm text-gray-500 leading-relaxed">
                </p>

                <div class="flex justify-between mt-6">

                    <div>

                        <p class="text-xs text-gray-400 mb-1">
                            Assignee:
                        </p>

                        <p id="modal-assignee" class="text-sm text-gray-700 font-medium">
                        </p>

                    </div>

                    <div>

                        <p class="text-xs text-gray-400 mb-1">
                            Priority:
                        </p>

                        <span id="modal-priority"
                            class="text-[11px] px-3 py-[3px] rounded-full text-white font-semibold">
                        </span>
                    </div>
                </div>
            </div>

            <div class="px-6 py-4 flex justify-end border-t border-gray-200 bg-gray-50">

                <form method="dialog">

                    <button
                        class="bg-purple-600 text-white text-sm px-5 py-2 rounded-md hover:bg-purple-700 transition">
                        Close
                    </button>
                </form>
            </div>
        </div>

    </dialog>

    <!-- JAVASCRIPT -->

    <script src="./js/gitHoub-Dashboard.js"></script>

</body>

</html>
